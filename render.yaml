services:
  - type: web
    name: chaos-runner-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: CHAOS_RUNNER_CORS_ORIGINS
        sync: false
  - type: static
    name: chaos-runner-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
